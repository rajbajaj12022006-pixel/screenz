<div class="movie-card">
  <a href="{% url 'movie_detail' movie.pk %}" class="card-link">
    <div class="card-poster">
      <img src="{{ movie.poster_url }}" alt="{{ movie.title }}" loading="lazy" onerror="this.src='/static/images/no-poster.png'">
      <div class="card-rating">⭐ {{ movie.vote_average|floatformat:1 }}</div>
      <div class="card-type-badge">{% if movie.content_type == 'tv' %}📺{% else %}🎬{% endif %}</div>
    </div>
    <div class="card-info">
      <div class="card-title">{{ movie.title|truncatechars:30 }}</div>
      <div class="card-year">{{ movie.release_year }}</div>
    </div>
  </a>
  <button class="watchlist-btn card-watchlist" data-pk="{{ movie.pk }}" title="Add to Watchlist">＋</button>
</div>
