{% extends 'base.html' %}
{% block title %}Sign Up — Screenz{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">SCREENZ</div>
    <p class="auth-sub">Create your free account</p>
    <div class="auth-tabs">
      <a href="{% url 'login' %}" class="auth-tab">Sign In</a>
      <a href="{% url 'signup' %}" class="auth-tab active">Sign Up</a>
    </div>
    {% if messages %}{% for msg in messages %}<div class="alert alert-error">{{ msg }}</div>{% endfor %}{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group">
          <label>FIRST NAME</label>
          <input type="text" name="first_name" placeholder="John">
        </div>
        <div class="form-group">
          <label>LAST NAME</label>
          <input type="text" name="last_name" placeholder="Doe">
        </div>
      </div>
      <div class="form-group">
        <label>EMAIL</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" name="password" placeholder="Min 8 characters" required>
      </div>
      <div class="form-group">
        <label>CONFIRM PASSWORD</label>
        <input type="password" name="confirm_password" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn-primary btn-full">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
  </div>
</div>
{% endblock %}
